    OpenAIBatchesIn:
      title: OpenAIBatchesIn
      required:
        - input_file_id
        - endpoint
        - completion_window
        - metadata
      type: object
      properties:
        input_file_id:
          title: Input File Id
          type: string
          description: The ID of an uploaded file that contains requests for the new batch.
        endpoint:
          title: Endpoint
          enum:
            - /v1/chat/completions
            - /v1/completions
          type: string
          description: 'The endpoint to be used for all requests in the batch. Currently /v1/chat/completions, /v1/completions are supported.'
        completion_window:
          const: 24h
          title: Completion Window
          type: string
          description: The time frame within which the batch should be processed. Currently only 24h is supported.
        metadata:
          title: Metadata
          anyOf:
            - type: object
            - type: 'null'
          description: Optional metadata to be stored with the batch.
    OpenAIChatCompletionsIn:
      title: OpenAIChatCompletionsIn
      required:
        - model
        - messages
      type: object
      properties:
        model:
          examples:
            - meta-llama/Llama-2-70b-chat-hf
          title: Model
          type: string
          description: model name
        messages:
          title: Messages
          type: array
          items:
            anyOf:
              - $ref: '#/components/schemas/ChatCompletionToolMessage'
              - $ref: '#/components/schemas/ChatCompletionAssistantMessage'
              - $ref: '#/components/schemas/ChatCompletionUserMessage'
              - $ref: '#/components/schemas/ChatCompletionSystemMessage'
          description: 'conversation messages: (user,assistant,tool)*,user including one system message anywhere'
        stream:
          title: Stream
          type: boolean
          description: whether to stream the output via SSE or return the full response
          default: false
        temperature:
          title: Temperature
          maximum: 2.0
          minimum: 0.0
          type: number
          description: 'What sampling temperature to use, between 0 and 2. Higher values like 0.8 will make the output more random, while lower values like 0.2 will make it more focused and deterministic'
          default: 1.0
        top_p:
          title: Top P
          maximum: 1.0
          exclusiveMinimum: 0.0
          type: number
          description: 'An alternative to sampling with temperature, called nucleus sampling, where the model considers the results of the tokens with top_p probability mass. So 0.1 means only the tokens comprising the top 10% probability mass are considered.'
          default: 1.0
        min_p:
          title: Min P
          maximum: 1.0
          minimum: 0.0
          type: number
          description: 'Float that represents the minimum probability for a token to be considered, relative to the probability of the most likely token. Must be in [0, 1]. Set to 0 to disable this.'
          default: 0.0
        top_k:
          title: Top K
          exclusiveMaximum: 1000.0
          minimum: 0.0
          type: integer
          description: Sample from the best k (number of) tokens. 0 means off
          default: 0
        max_tokens:
          title: Max Tokens
          anyOf:
            - maximum: 1000000.0
              minimum: 0.0
              type: integer
            - type: 'null'
          description: "The maximum number of tokens to generate in the chat completion.\n\nThe total length of input tokens and generated tokens is limited by the model's context length. If explicitly set to None it will be the model's max context length minus input length or 16384, whichever is smaller."
        stop:
          title: Stop
          anyOf:
            - type: string
            - type: array
              items:
                type: string
            - type: 'null'
          description: up to 16 sequences where the API will stop generating further tokens
        n:
          title: N
          maximum: 4.0
          minimum: 1.0
          type: integer
          description: number of sequences to return
          default: 1
        presence_penalty:
          title: Presence Penalty
          maximum: 2.0
          minimum: -2.0
          type: number
          description: 'Positive values penalize new tokens based on whether they appear in the text so far, increasing the model''s likelihood to talk about new topics.'
          default: 0
        frequency_penalty:
          title: Frequency Penalty
          maximum: 2.0
          minimum: -2.0
          type: number
          description: 'Positive values penalize new tokens based on how many times they appear in the text so far, increasing the model''s likelihood to talk about new topics.'
          default: 0
        tools:
          title: Tools
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/ChatTools'
            - type: 'null'
          description: 'A list of tools the model may call. Currently, only functions are supported as a tool.'
        tool_choice:
          title: Tool Choice
          anyOf:
            - type: string
            - $ref: '#/components/schemas/ChatTools'
            - type: 'null'
          description: Controls which (if any) function is called by the model. none means the model will not call a function and instead generates a message. auto means the model can pick between generating a message or calling a function. required means the model must call a function. defined tool means the model must call that specific tool. none is the default when no functions are present. auto is the default if functions are present.
        response_format:
          title: Response Format
          anyOf:
            - $ref: '#/components/schemas/TextResponseFormat'
            - $ref: '#/components/schemas/JsonObjectResponseFormat'
            - $ref: '#/components/schemas/JsonSchemaResponseFormat'
            - $ref: '#/components/schemas/RegexResponseFormat'
            - type: 'null'
          description: 'The format of the response. Currently, only json is supported.'
        repetition_penalty:
          title: Repetition Penalty
          maximum: 5.0
          minimum: 0.01
          type: number
          description: 'Alternative penalty for repetition, but multiplicative instead of additive (> 1 penalize, < 1 encourage)'
          default: 1
        user:
          title: User
          anyOf:
            - type: string
            - type: 'null'
          description: 'A unique identifier representing your end-user, which can help monitor and detect abuse. Avoid sending us any identifying information. We recommend hashing user identifiers.'
        seed:
          title: Seed
          anyOf:
            - type: integer
            - type: 'null'
          description: 'Seed for random number generator. If not provided, a random seed is used. Determinism is not guaranteed.'
        logprobs:
          title: Logprobs
          anyOf:
            - type: boolean
            - type: 'null'
          description: 'Whether to return log probabilities of the output tokens or not.If true, returns the log probabilities of each output token returned in the `content` of `message`.'
        stream_options:
          anyOf:
            - $ref: '#/components/schemas/StreamOptions'
            - type: 'null'
          description: streaming options
        reasoning_effort:
          title: Reasoning Effort
          anyOf:
            - enum:
                - low
                - medium
                - high
                - none
              type: string
            - type: 'null'
          description: 'Constrains effort on reasoning for reasoning models. Currently supported values are none, low, medium, and high. Reducing reasoning effort can result in faster responses and fewer tokens used on reasoning in a response. Setting to none disables reasoning entirely if the model supports.'
        reasoning:
          anyOf:
            - $ref: '#/components/schemas/ChatReasoningSettings'
            - type: 'null'
          description: Reasoning configuration.
        prompt_cache_key:
          title: Prompt Cache Key
          anyOf:
            - type: string
            - type: 'null'
          description: 'A key to identify prompt cache for reuse across requests. If provided, the prompt will be cached and can be reused in subsequent requests with the same key.'
        chat_template_kwargs:
          title: Chat Template Kwargs
          anyOf:
            - type: object
            - type: 'null'
          description: Chat template kwargs.
