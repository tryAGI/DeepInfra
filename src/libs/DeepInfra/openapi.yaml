components:
  schemas:
    AddFundsIn:
      title: AddFundsIn
      required:
        - amount
      type: object
      properties:
        amount:
          title: Amount
          type: integer
          description: Amount to add in cents
    BillingPortalOut:
      title: BillingPortalOut
      required:
        - url
      type: object
      properties:
        url:
          title: Url
          type: string
    Checklist:
      title: Checklist
      required:
        - stripe_balance
        - recent
        - limit
        - suspend_reason
      type: object
      properties:
        email:
          title: Email
          type: boolean
          default: false
        billing_address:
          title: Billing Address
          type: boolean
          default: false
        payment_method:
          title: Payment Method
          type: boolean
          default: false
        suspended:
          title: Suspended
          type: boolean
          default: false
        overdue_invoices:
          title: Overdue Invoices
          type: number
          default: 0.0
        last_checked:
          title: Last Checked
          type: integer
          default: 0
        stripe_balance:
          title: Stripe Balance
          type: number
          description: Negative value indicates funds ready-to-spend. Positive value indicates money owed
        recent:
          title: Recent
          type: number
          description: usage since most recent invoice
        limit:
          title: Limit
          anyOf:
            - type: number
            - type: 'null'
        suspend_reason:
          anyOf:
            - $ref: '#/components/schemas/SuspendReason'
            - type: 'null'
        topup:
          title: Topup
          type: boolean
          default: false
        topup_amount:
          title: Topup Amount
          type: integer
          default: 0
        topup_threshold:
          title: Topup Threshold
          type: integer
          default: 0
        topup_failed:
          title: Topup Failed
          type: boolean
          default: false
    ConfigIn:
      title: ConfigIn
      type: object
      properties:
        limit:
          title: Limit
          anyOf:
            - type: number
            - type: 'null'
          description: Set usage limit (in USD). Negative means no limit.null/not-set means don't change it
    ConfigOut:
      title: ConfigOut
      required:
        - limit
      type: object
      properties:
        limit:
          title: Limit
          type: number
          description: Spending limit (in USD). Negative means no limit
    DeepStartApplicationIn:
      title: DeepStartApplicationIn
      required:
        - company
        - ceo
        - funding
        - founded_on
        - website
      type: object
      properties:
        id:
          title: Id
          type: string
        uid:
          title: Uid
          anyOf:
            - type: string
            - type: 'null'
        company:
          title: Company
          type: string
        ceo:
          title: Ceo
          type: string
        funding:
          title: Funding
          type: string
        founded_on:
          title: Founded On
          type: string
        website:
          title: Website
          type: string
        created_at:
          title: Created At
          type: integer
        status:
          title: Status
          type: string
          default: pending
        deal:
          title: Deal
          anyOf:
            - type: string
            - type: 'null'
    DeepStartApplicationOut:
      title: DeepStartApplicationOut
      required:
        - company
        - ceo
        - funding
        - founded_on
        - website
      type: object
      properties:
        id:
          title: Id
          type: string
        uid:
          title: Uid
          anyOf:
            - type: string
            - type: 'null'
        company:
          title: Company
          type: string
        ceo:
          title: Ceo
          type: string
        funding:
          title: Funding
          type: string
        founded_on:
          title: Founded On
          type: string
        website:
          title: Website
          type: string
        created_at:
          title: Created At
          type: integer
        status:
          title: Status
          type: string
          default: pending
        deal:
          title: Deal
          anyOf:
            - type: string
            - type: 'null'
        email:
          title: Email
          anyOf:
            - type: string
            - type: 'null'
    DiscountMeta:
      title: DiscountMeta
      required:
        - name
      type: object
      properties:
        name:
          title: Name
          type: string
        description:
          title: Description
          anyOf:
            - type: string
            - type: 'null'
          description: 'description of the discount, only for display purposes'
    HTTPValidationError:
      title: HTTPValidationError
      type: object
      properties:
        detail:
          title: Detail
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
    ModelMeta:
      title: ModelMeta
      required:
        - provider
        - model_name
        - task
      type: object
      properties:
        provider:
          title: Provider
          type: string
        model_name:
          title: Model Name
          type: string
        task:
          title: Task
          type: string
        plan_id:
          title: Plan Id
          anyOf:
            - type: string
            - type: 'null'
        private:
          title: Private
          type: boolean
          default: false
    SuspendReason:
      title: SuspendReason
      enum:
        - balance
        - payment-method
        - overdue-invoices
